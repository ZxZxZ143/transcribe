<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Transcription Pipeline</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1>Audio Transcription Pipeline</h1>
        <p>Загрузка аудио, транскрибация, предобработка и выгрузка итогового CSV.</p>
      </div>

      <button id="downloadCsvButton" class="secondary-button">
        Скачать CSV
      </button>
    </section>

    <section class="card">
      <h2>Загрузка файлов</h2>

      <div class="upload-box">
        <input
          id="fileInput"
          type="file"
          multiple
          accept=".wav,.mp3,.m4a,.mp4,.ogg,.flac,.aac,.wma,.webm,.opus,.aiff,.aif"
        />

        <button id="uploadButton" class="primary-button">
          Загрузить и обработать
        </button>
      </div>

      <div id="statusMessage" class="status-message"></div>
    </section>

    <section class="card">
      <div class="table-header">
        <div>
          <h2>Результаты</h2>
          <p id="resultsInfo">Последние обработанные файлы</p>
        </div>

        <div class="actions">
          <button id="refreshButton" class="secondary-button">
            Обновить
          </button>

          <button id="clearButton" class="danger-button">
            Очистить
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Файл</th>
              <th>Статус</th>
              <th>Язык</th>
              <th>Уверенность</th>
              <th>Слов raw</th>
              <th>Слов clean</th>
              <th>Review</th>
              <th>Ready</th>
              <th>Очищенный текст</th>
            </tr>
          </thead>

          <tbody id="resultsTableBody">
            <tr>
              <td colspan="9" class="empty-cell">
                Пока нет данных
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
